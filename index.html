
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex Nego 12 Fitness - Avaliação Física</title>
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .recharts-surface { overflow: visible !important; }
        /* Prevent selection during fast clicking on mobile */
        button { user-select: none; }
        
        /* PDF Export Helpers */
        .pdf-only { display: none; }
        .pdf-printing .pdf-only { display: flex !important; }
        .break-inside-avoid { break-inside: avoid; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300">
    <div id="root">
      <div id="loading-fallback" style="padding: 40px 20px; font-family: sans-serif; text-align: center; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="max-width: 500px; margin: 0 auto; background: white; padding: 32px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
          <h1 style="color: #f97316; font-size: 24px; margin-bottom: 16px; font-weight: bold;">Carregando...</h1>
          <p style="color: #4b5563; margin-bottom: 24px;">O aplicativo está sendo inicializado. Se demorar muito, tente recarregar.</p>
          <button onclick="window.location.reload()" style="padding: 14px 24px; background: #f97316; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px;">
            Recarregar Agora
          </button>
          <div id="debug-info" style="margin-top: 24px; font-size: 10px; color: #94a3b8; text-align: left; font-family: monospace;">
            Iniciando carregamento...
          </div>
        </div>
      </div>
    </div>
    
    <script>
      // Timeout to detect if the app failed to load
      setTimeout(() => {
        const root = document.getElementById('root');
        const fallback = document.getElementById('loading-fallback');
        if (fallback && root && root.contains(fallback)) {
          document.getElementById('debug-info').innerHTML += '<br><span style="color: #ef4444;">Erro: O aplicativo demorou mais de 10s para carregar. Verifique sua conexão ou tente limpar o cache.</span>';
          document.getElementById('debug-info').innerHTML += '<br>UserAgent: ' + navigator.userAgent;
        }
      }, 10000);
    </script>
    <!-- Service Worker disabled for debugging mobile white screen -->
    <!-- <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW reg error:', err));
        });
      }
    </script> -->
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
